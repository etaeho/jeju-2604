<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제주도 여행 트래블 캔버스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .active-tab { color: #2563eb; }
        .inactive-tab { color: #94a3b8; }
        .day-btn-active { background-color: #0f172a; color: white; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .day-btn-inactive { background-color: white; color: #64748b; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-24">

    <!-- Header -->
    <header class="bg-white px-6 pt-10 pb-6 border-b border-slate-200 sticky top-0 z-10">
        <div class="flex justify-between items-end mb-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-900">제주도 여행</h1>
                <p class="text-slate-500 text-sm">2026.04.24 - 04.27 (3박 4일)</p>
            </div>
            <div class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-xs font-semibold">
                예약 관리중
            </div>
        </div>

        <!-- View: Itinerary Header -->
        <div id="itinerary-header">
            <div class="flex gap-2 overflow-x-auto no-scrollbar py-2" id="day-selector">
                <!-- Day buttons generated by JS -->
            </div>
        </div>

        <!-- View: Budget Header (Hidden by default) -->
        <div id="budget-header" class="hidden">
            <div class="flex items-center justify-between bg-slate-900 text-white p-4 rounded-2xl shadow-lg mt-2">
                <div>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">총 지출 (예약된 항목)</p>
                    <h2 class="text-xl font-bold" id="total-amount-display">333,011원</h2>
                </div>
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-blue-400 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" />
                </svg>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="px-6 py-6 max-w-2xl mx-auto" id="main-content">
        <!-- Content will be injected here by JS -->
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-white/80 backdrop-blur-lg shadow-2xl rounded-3xl border border-slate-200 px-8 py-3 flex justify-around items-center z-20">
        <button onclick="switchTab('itinerary')" id="nav-itinerary" class="flex flex-col items-center gap-1 active-tab">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            <span class="text-[10px] font-bold">일정</span>
        </button>
        <button onclick="switchTab('budget')" id="nav-budget" class="flex flex-col items-center gap-1 inactive-tab">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
            </svg>
            <span class="text-[10px] font-bold">경비</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <span class="text-[10px] font-bold">지도</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
            <span class="text-[10px] font-bold">공유</span>
        </button>
    </nav>

    <script>
        let currentTab = 'itinerary';
        let currentDay = 0;

        const itinerary = [
            {
                date: '04월 24일 (금)',
                highlight: null,
                events: [
                    { time: '17:10', title: '청주 공항 출발', location: '청주국제공항', details: '아시아나항공 OZ8235 (예약: EJ4QMV)', icon: 'plane' },
                    { time: '18:20', title: '제주 공항 도착', location: '제주국제공항', details: null, icon: 'pin' },
                    { time: '19:30', title: '제주 팰리스 호텔 체크인', location: '제주 제주시 중앙로 9', details: '싱글트윈 (예약: 2603101352460090)', icon: 'hotel' },
                    { time: '20:00', title: '저녁 식사: 미친부엌', location: '제주 제주시 탑동로 15', details: '제주 탑동 유명 이자카야/식당', icon: 'food' }
                ]
            },
            {
                date: '04월 25일 (토)',
                highlight: '💍 결혼식 및 피로연 (메인 일정)',
                events: [
                    { time: '08:00', title: '렌터카 인수', location: '자유렌터카', details: '더뉴아반떼CN7 2023 (예약: 155435)', icon: 'car' },
                    { time: '08:30', title: '외삼촌 픽업', location: '약속 장소 확인 필요', details: '픽업 후 식장으로 이동', icon: 'users' },
                    { time: '10:00-18:00', title: '결혼식 참석 및 피로연', location: '예식장 확인 필요', details: '예식 참석 후 피로연 및 인사 (종일 일정)', icon: 'heart', type: 'main' },
                    { time: '18:30', title: '더 퍼스트70 호텔 체크인', location: '서귀포시 명동로 46', details: '슈페리어 트윈 (예약: 1707606719)', icon: 'hotel' }
                ]
            },
            {
                date: '04월 26일 (일)',
                events: [
                    { time: '11:00', title: '더 퍼스트70 체크아웃', location: '호텔 로비', details: null, icon: 'clock' },
                    { time: '전일', title: '자유 일정 및 숙박 필요', location: '제주 전역', details: '3박째 숙소 예약 내역 확인 요망', icon: 'alert', type: 'warning' }
                ]
            },
            {
                date: '04월 27일 (월)',
                events: [
                    { time: '11:00', title: '오전 자유 일정', location: '서귀포/제주 일대', details: null, icon: 'calendar' },
                    { time: '18:00', title: '렌터카 반납', location: '자유렌터카 반납소', details: null, icon: 'car' },
                    { time: '19:45', title: '제주 공항 출발', location: '제주국제공항', details: '아시아나항공 OZ8236 (예약: EJ56YF)', icon: 'plane' }
                ]
            }
        ];

        const budgetItems = [
            { category: '항공', title: '청주 → 제주 (아시아나)', amount: 74700, date: '04.24', icon: 'plane' },
            { category: '항공', title: '제주 → 청주 (아시아나)', amount: 67700, date: '04.27', icon: 'plane' },
            { category: '숙소', title: '제주 팰리스 호텔 (1박)', amount: 76800, date: '04.24', icon: 'hotel' },
            { category: '숙소', title: '더 퍼스트70 호텔 (1박)', amount: 53811, date: '04.25', icon: 'hotel' },
            { category: '렌터카', title: '자유렌터카 (아반떼)', amount: 60000, date: '04.25', icon: 'car' },
            { category: '숙소', title: '3박째 숙소', amount: 0, date: '04.26', icon: 'hotel', pending: true },
        ];

        function getIcon(name, colorClass = "text-slate-500") {
            const icons = {
                plane: `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 ${colorClass}" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>`,
                hotel: `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 ${colorClass}" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-7h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>`,
                car: `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 ${colorClass}" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l1-2h12l1 2M3 10h18M4 14h1m12 0h1M4 10v7a1 1 0 001 1h14a1 1 0 001-1v-7M7 18v1m10-1v1" /></svg>`,
                pin: `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 ${colorClass}" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>`,
                food: `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 ${colorClass}" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>`,
                users: `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 ${colorClass}" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>`,
                heart: `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 ${colorClass}" fill="currentColor" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>`,
                alert: `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 ${colorClass}" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>`,
                clock: `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 ${colorClass}" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>`,
                calendar: `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 ${colorClass}" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>`
            };
            return icons[name] || icons.pin;
        }

        function renderDaySelector() {
            const container = document.getElementById('day-selector');
            container.innerHTML = itinerary.map((day, idx) => `
                <button onclick="changeDay(${idx})" class="flex-shrink-0 px-4 py-2 rounded-xl text-sm transition-all ${currentDay === idx ? 'day-btn-active' : 'day-btn-inactive'}">
                    Day ${idx + 1}
                    <span class="block text-[10px] opacity-70">${day.date.split(' ')[0]}</span>
                </button>
            `).join('');
        }

        function renderItinerary() {
            const container = document.getElementById('main-content');
            const day = itinerary[currentDay];
            
            let html = '';
            
            if (day.highlight) {
                html += `
                    <div class="mb-6 p-4 bg-pink-50 border border-pink-100 rounded-2xl flex items-center gap-3">
                        ${getIcon('heart', 'text-pink-500')}
                        <span class="font-bold text-pink-700">${day.highlight}</span>
                    </div>
                `;
            }

            html += '<div class="space-y-4">';
            day.events.forEach((event, idx) => {
                const iconColor = event.type === 'main' ? 'text-pink-500' : event.type === 'warning' ? 'text-amber-500' : 'text-slate-500';
                const bgIcon = event.type === 'main' ? 'bg-pink-100' : event.type === 'warning' ? 'bg-amber-100' : 'bg-slate-50';
                const ringClass = event.type === 'main' ? 'ring-2 ring-pink-100' : '';

                html += `
                    <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 flex gap-4 items-start ${ringClass}">
                        <div class="flex flex-col items-center">
                            <span class="text-xs font-bold text-slate-400 mb-2 whitespace-nowrap">${event.time}</span>
                            <div class="p-3 rounded-2xl ${bgIcon}">
                                ${getIcon(event.icon, iconColor)}
                            </div>
                            ${idx !== day.events.length - 1 ? '<div class="w-0.5 h-full bg-slate-100 mt-4 rounded-full"></div>' : ''}
                        </div>
                        <div class="flex-1">
                            <h3 class="font-bold text-slate-900 text-lg mb-1">${event.title}</h3>
                            <div class="flex items-center gap-1 text-slate-500 text-sm mb-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /></svg>
                                ${event.location}
                            </div>
                            ${event.details ? `<div class="p-3 rounded-xl text-xs font-medium leading-relaxed ${event.type === 'warning' ? 'bg-amber-50 text-amber-700' : 'bg-slate-50 text-slate-600'}">${event.details}</div>` : ''}
                        </div>
                    </div>
                `;
            });
            html += '</div>';

            if (currentDay === 2) {
                html += `
                    <div class="mt-8 p-6 bg-amber-50 rounded-2xl border-2 border-dashed border-amber-200">
                        <div class="flex items-center gap-2 mb-2">
                            ${getIcon('alert', 'text-amber-600')}
                            <h4 class="font-bold text-amber-800 text-sm">확인이 필요합니다!</h4>
                        </div>
                        <p class="text-amber-700 text-xs leading-relaxed">4월 26일 밤 숙박 예약 내역이 없습니다. 연박 혹은 다른 예약을 체크해 보세요.</p>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        function renderBudget() {
            const container = document.getElementById('main-content');
            
            const categoryTotals = budgetItems.reduce((acc, item) => {
                acc[item.category] = (acc[item.category] || 0) + item.amount;
                return acc;
            }, {});

            let html = `
                <div class="space-y-6">
                    <div class="grid grid-cols-3 gap-2">
                        <div class="bg-blue-50 p-3 rounded-2xl border border-blue-100 text-center">
                            <p class="text-[9px] font-bold text-blue-600 uppercase mb-1">항공</p>
                            <p class="font-bold text-sm">${(categoryTotals['항공'] || 0).toLocaleString()}원</p>
                        </div>
                        <div class="bg-indigo-50 p-3 rounded-2xl border border-indigo-100 text-center">
                            <p class="text-[9px] font-bold text-indigo-600 uppercase mb-1">숙소</p>
                            <p class="font-bold text-sm">${(categoryTotals['숙소'] || 0).toLocaleString()}원</p>
                        </div>
                        <div class="bg-emerald-50 p-3 rounded-2xl border border-emerald-100 text-center">
                            <p class="text-[9px] font-bold text-emerald-600 uppercase mb-1">렌터카</p>
                            <p class="font-bold text-sm">${(categoryTotals['렌터카'] || 0).toLocaleString()}원</p>
                        </div>
                    </div>

                    <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                        <div class="p-5 border-b border-slate-50 bg-slate-50/50 flex justify-between items-center">
                            <h3 class="font-bold text-slate-800">지출 상세 내역</h3>
                            <span class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">단위: KRW</span>
                        </div>
                        <div class="divide-y divide-slate-50">
            `;

            budgetItems.forEach(item => {
                html += `
                    <div class="p-5 flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="p-2 rounded-lg ${item.pending ? 'bg-slate-100 text-slate-400' : 'bg-slate-50 text-slate-600'}">
                                ${getIcon(item.icon, item.pending ? 'text-slate-300' : 'text-slate-500')}
                            </div>
                            <div>
                                <p class="text-xs text-slate-400 font-bold mb-0.5">${item.date} • ${item.category}</p>
                                <p class="font-bold text-sm text-slate-800">${item.title}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            ${item.pending ? '<span class="text-[10px] font-bold text-amber-600 bg-amber-50 px-2 py-1 rounded-md">확인 필요</span>' : `<p class="font-bold text-slate-900">${item.amount.toLocaleString()}원</p>`}
                        </div>
                    </div>
                `;
            });

            html += `
                        </div>
                    </div>

                    <div class="p-5 bg-amber-50 rounded-2xl border border-amber-100 flex gap-4">
                        ${getIcon('alert', 'text-amber-500')}
                        <div>
                            <p class="text-xs font-bold text-amber-800 mb-1">식비 및 기타 경비 미포함</p>
                            <p class="text-[11px] text-amber-700 leading-relaxed">미친부엌 등 식비와 렌터카 주유비 등이 추가될 예정입니다.</p>
                        </div>
                    </div>
                </div>
            `;

            container.innerHTML = html;
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('itinerary-header').classList.toggle('hidden', tab !== 'itinerary');
            document.getElementById('budget-header').classList.toggle('hidden', tab !== 'budget');
            
            document.getElementById('nav-itinerary').className = `flex flex-col items-center gap-1 ${tab === 'itinerary' ? 'active-tab' : 'inactive-tab'}`;
            document.getElementById('nav-budget').className = `flex flex-col items-center gap-1 ${tab === 'budget' ? 'active-tab' : 'inactive-tab'}`;

            if (tab === 'itinerary') {
                renderDaySelector();
                renderItinerary();
            } else {
                renderBudget();
            }
        }

        function changeDay(dayIdx) {
            currentDay = dayIdx;
            renderDaySelector();
            renderItinerary();
        }

        // Initial render
        window.onload = () => {
            renderDaySelector();
            renderItinerary();
        };
    </script>
</body>
</html>
